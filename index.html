<!DOCTYPE html>
<html>
<head>
  <title>Patchbay Trainer (Completion Tracking)</title>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      background: #111;
      font-family: Arial;
    }

    #ui {
      position: fixed;
      top: 10px;
      right: 10px;
      color: white;
      width: 360px;
      z-index: 9999;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 6px;
    }

    button {
      margin: 4px;
      padding: 6px 10px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
    }

    #container {
      position: relative;
      width: 80%;
      max-width: 1200px;
    }

    #patchbay {
      width: 100%;
      pointer-events: none;
    }

    #cables, #points {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #cables { z-index: 2; }
    #points { z-index: 3; }

    .patch-point {
      position: absolute;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .correct { background: #00ff66; }
    .wrong { background: #ff4444; }
    .help { background: #b450ff; }
    .selected { background: yellow !important; }

  </style>
</head>

<body>

<div id="ui">
  <div id="questionText">Loading...</div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>

  <br>

  <button onclick="undoLast()">Undo Last Patch</button>
  <button onclick="helpMe()">Help Me</button>

  <div id="status"></div>
</div>

<div id="container">
  <img src="patchbay.png" id="patchbay">
  <svg id="cables"></svg>
  <div id="points"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzz0R4vldQ4FtcQGX22DYGBUTK7Wy5B5o6kJJ8Alvyv5dhGo5LMHfWrj2u8ZBHQc2Cj/exec?row=";

const startLeft = 8.3;
const spacingX = 1.814;

const rowTop = {
  A: 11.7, B: 15.4, C: 23.2, D: 27,
  E: 34.85, F: 38.55, G: 46.4, H: 50.1,
  I: 57.45, J: 61.2, K: 68.32, L: 72.05,
  M: 79.2, N: 83, O: 90.1, P: 93.9
};

const rows = "ABCDEFGHIJKLMNOP";
const cols = 48;

let currentRow = 3;
let firstPoint = null;

let stateByQuestion = {};
let correctByQuestion = {};
let svgGroups = {};

const svg = document.getElementById("cables");
const container = document.getElementById("container");
const pointsLayer = document.getElementById("points");

/* GRID */
for (let r = 0; r < rows.length; r++) {
  const row = rows[r];

  for (let c = 0; c < cols; c++) {
    const el = document.createElement("div");
    el.className = "patch-point";

    const id = row + (c + 1);
    el.dataset.id = id;

    el.style.left = (startLeft + c * spacingX) + "%";
    el.style.top = rowTop[row] + "%";

    pointsLayer.appendChild(el);
  }
}

/* CLICK */
pointsLayer.addEventListener("click", (e) => {

  const p = e.target.closest(".patch-point");
  if (!p) return;

  if (!firstPoint) {
    firstPoint = p;
    p.classList.add("selected");
    return;
  }

  if (firstPoint === p) {
    firstPoint.classList.remove("selected");
    firstPoint = null;
    return;
  }

  addPatch(firstPoint.dataset.id, p.dataset.id);

  firstPoint.classList.remove("selected");
  firstPoint = null;
});

/* ADD PATCH */
function addPatch(from, to) {

  if (!stateByQuestion[currentRow]) stateByQuestion[currentRow] = [];

  stateByQuestion[currentRow].push({ from, to });

  redrawAll();
}

/* HELP */
function helpMe() {
  const correct = correctByQuestion[currentRow] || [];

  stateByQuestion[currentRow] = correct.map(p => ({
    from: p.from,
    to: p.to,
    help: true
  }));

  redrawAll();
}

/* REDRAW */
function redrawAll() {

  Object.values(svgGroups).forEach(g => g.innerHTML = "");

  document.querySelectorAll(".patch-point")
    .forEach(p => p.className = "patch-point");

  for (let row in stateByQuestion) {

    (stateByQuestion[row] || []).forEach(patch => {

      const g = getGroup(row);
      const rect = container.getBoundingClientRect();

      const p1 = document.querySelector(`[data-id="${patch.from}"]`);
      const p2 = document.querySelector(`[data-id="${patch.to}"]`);

      const r1 = p1.getBoundingClientRect();
      const r2 = p2.getBoundingClientRect();

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

      line.setAttribute("x1", r1.left - rect.left + r1.width/2);
      line.setAttribute("y1", r1.top - rect.top + r1.height/2);
      line.setAttribute("x2", r2.left - rect.left + r2.width/2);
      line.setAttribute("y2", r2.top - rect.top + r2.height/2);

      let color = "#00ffcc";

      if (patch.help) {
        color = "#b450ff";
        mark(patch.from,"help");
        mark(patch.to,"help");
      } else {
        const correct = (correctByQuestion[row] || []).some(c =>
          (c.from === patch.from && c.to === patch.to) ||
          (c.from === patch.to && c.to === patch.from)
        );

        color = correct ? "#00ff66" : "#ff4444";
        mark(patch.from, correct ? "correct" : "wrong");
        mark(patch.to, correct ? "correct" : "wrong");
      }

      line.setAttribute("stroke", color);
      line.setAttribute("stroke-width", "3");

      g.appendChild(line);
    });
  }

  updateStatus();
}

/* STATUS LOGIC */
function updateStatus() {

  const correct = correctByQuestion[currentRow] || [];
  const user = stateByQuestion[currentRow] || [];

  let correctCount = 0;

  user.forEach(u => {
    const ok = correct.some(c =>
      (c.from === u.from && c.to === u.to) ||
      (c.from === u.to && c.to === u.from)
    );
    if (ok) correctCount++;
  });

  let statusText = `${correctCount} / ${correct.length} correct`;

  if (correctCount === 0) statusText += " ❌";
  else if (correctCount < correct.length) statusText += " ⚠️";
  else statusText += " ✅";

  document.getElementById("status").innerText = statusText;
}

/* HELPERS */
function mark(id, cls) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add(cls);
}

function getGroup(row) {
  if (!svgGroups[row]) {
    const g = document.createElementNS("http://www.w3.org/2000/svg","g");
    svg.appendChild(g);
    svgGroups[row] = g;
  }
  return svgGroups[row];
}

/* UNDO */
function undoLast() {
  const arr = stateByQuestion[currentRow];
  if (!arr || arr.length === 0) return;
  arr.pop();
  redrawAll();
}

/* LOAD */
async function loadQuestion(row) {

  currentRow = row;

  const res = await fetch(API_URL + row);
  const data = await res.json();

  document.getElementById("questionText").innerText = data.question;

  correctByQuestion[row] = data.patches || [];

  if (!stateByQuestion[row]) stateByQuestion[row] = [];

  redrawAll();
}

/* NAV */
function nextQuestion() { loadQuestion(currentRow + 1); }
function prevQuestion() { if (currentRow > 2) loadQuestion(currentRow - 1); }

/* INIT */
loadQuestion(3);

</script>

</body>
</html>
